<html>
  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
    

    <label for="range4" class="form-label"><h3>Deposite Amount</h3></label>
    <input type="range" class="form-range" min="5000" max="1000000" value="50" id="range4">
    <output for="range4" id="rangeValue" aria-hidden="true"></output>

    <br>
<label for="range41" class="form-label"><h3>Interest Rate</h3></label>
<input type="range" class="form-range" min="1" max="15" value="50" id="range41">
<output for="range41" id="rangeValue1" aria-hidden="true"></output>


    <br>

    <label for="range42" class="form-label"><h3>Time Period</h3></label>
    <input type="range" class="form-range" min="1" max="60" value="50" id="range42">
    <output for="range42" id="rangeValue2" aria-hidden="true"></output>

    <br>
    <button id="button">Calculate</button><input type="number" id="result">





<script>
  // This is an example script, please modify as needed
  const rangeInput = document.getElementById('range4');
  const rangeOutput = document.getElementById('rangeValue');

  // Set initial value
  rangeOutput.textContent = rangeInput.value;

  rangeInput.addEventListener('input', function() {
    rangeOutput.textContent = this.value;
  });

  
  const rangeInput1 = document.getElementById('range41');
const rangeOutput1 = document.getElementById('rangeValue1');


rangeOutput1.textContent = rangeInput1.value;


rangeInput1.addEventListener('input', function() {
  rangeOutput1.textContent = this.value;
});


  // This is an example script, please modify as needed
  const rangeInput2 = document.getElementById('range42');
  const rangeOutput2 = document.getElementById('rangeValue2');

  // Set initial value
  rangeOutput2.textContent = rangeInput2.value;

  rangeInput2.addEventListener('input', function() {
    rangeOutput2.textContent = this.value;
  });


  let btn=document.getElementById("button");
  let result=document.getElementById("result");

  btn.addEventListener("click",function()
  {
    let p=Number(rangeInput.value);
    let r=Number(rangeInput1.value);
    let t=Number(rangeInput2.value);

    let interest=(p*r*t)/100;
    result.value=interest;
  } );
</script>


  </body>
</html>
